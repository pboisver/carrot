repos:
  - repo: local
    hooks:
      - id: uv-export
        name: Auto-export requirements.txt
        entry: uv export -o requirements.txt
        language: system
        files: ^(pyproject\.toml|uv\.lock)$
        pass_filenames: false
      - id: poe-hooks
        name: Run test Poe script
        entry: uv run poe hello
        language: system
        pass_filenames: false
        always_run: true
        verbose: true